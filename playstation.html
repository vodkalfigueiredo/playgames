<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayGames | PlayStation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Fundo Dinâmico Animado PlayStation -->
    <div class="dynamic-bg ps-dynamic-bg"></div>

    <div class="top-bar">
        <div class="top-bar-content">
            <span class="corp-logo">PLAYGAMES INC.</span>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="brand-logo">
                <i class="fa-solid fa-gamepad"></i>
                <span>PlayGames</span>
            </a>
            <ul class="nav-links" id="nav-links-menu">
                <li><a href="#ps5">PlayStation 5</a></li>
                <li><a href="#ps4">PlayStation 4</a></li>
                <li><a href="index.html">Voltar ao Portal</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="search-bar" id="search-bar">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Pesquisar jogos..." autocomplete="off">
                <button class="search-clear" id="search-clear" style="display:none;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="document.getElementById('nav-links-menu').classList.toggle('mobile-open')">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Hero Slider Simplificado -->
    <section class="hero-slider">
        <div class="slides-container"></div>
        <div class="slider-controls"></div>
    </section>

    <main class="main-content">
        <section id="ps5" class="category-section">
            <div class="section-header">
                <div class="section-title-wrapper">
                    <i class="fa-brands fa-playstation section-icon ps-color"></i>
                    <h2>Jogos de PlayStation 5</h2>
                </div>
            </div>
            <div class="games-grid" id="grid-ps5"></div>
        </section>

        <section id="ps4" class="category-section">
            <div class="section-header">
                <div class="section-title-wrapper">
                    <i class="fa-brands fa-playstation section-icon ps-color"></i>
                    <h2>Jogos de PlayStation 4</h2>
                </div>
            </div>
            <div class="games-grid" id="grid-ps4"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
