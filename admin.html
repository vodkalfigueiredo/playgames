<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | PlayGames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">
    
    <!-- Background Animado -->
    <div class="admin-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <!-- Tela de Login Clean -->
    <div id="login-section" class="admin-section active">
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-gamepad logo-icon"></i>
                <h2>Admin Portal</h2>
                <p>Acesse o modo de edição do site.</p>
            </div>
            
            <form id="login-form" novalidate>
                <div class="input-group">
                    <label for="admin-email">Usuário</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="admin-email" placeholder="Digite playgames" autocomplete="off">
                    </div>
                </div>
                <div class="input-group">
                    <label for="admin-password">Senha de Segurança</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" id="admin-password" placeholder="Digite sua senha">
                    </div>
                </div>
                <button type="submit" class="btn-login" id="btn-login">
                    Autenticar <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
                <div id="login-error" class="error-msg"></div>
            </form>
            
            <div class="login-footer">
                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar para a Loja</a>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
